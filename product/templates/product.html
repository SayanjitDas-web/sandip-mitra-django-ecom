<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.product_title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --parchment:     #FAF7F2;
            --parchment-mid: #F0EBE3;
            --border:        #E0D8CE;
            --ink:           #1C1C1C;
            --ink-muted:     #6B6560;
            --terracotta:    #C1440E;
            --white:         #FFFFFF;
        }

        body {
            background: var(--parchment);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ── Nav breadcrumb ── */
        .site-nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem 4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .site-nav a {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .site-nav a:hover { color: var(--terracotta); }

        .nav-sep {
            font-size: 0.78rem;
            color: var(--border);
        }

        .nav-current {
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink);
            /* truncate long titles */
            max-width: 28ch;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Main layout ── */
        .detail-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 57px);
        }

        /* ── Image pane ── */
        .image-pane {
            position: sticky;
            top: 0;
            height: 100vh;
            background: var(--parchment-mid);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .image-pane img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .image-pane:hover img {
            transform: scale(1.03);
        }

        /* ── Info pane ── */
        .info-pane {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
            max-width: 560px;
        }

        /* eyebrow label */
        .product-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--terracotta);
        }

        /* title */
        .product-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 3.5vw, 3rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        /* divider */
        .divider {
            width: 3rem;
            height: 2px;
            background: var(--terracotta);
            border: none;
        }

        /* price block */
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .price-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .price-value {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        /* CTA button */
        .btn-buy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1rem 2.5rem;
            background: var(--terracotta);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-decoration: none;
            border: 2px solid var(--terracotta);
            cursor: pointer;
            transition: background 0.25s, color 0.25s, gap 0.25s;
            align-self: flex-start;
        }

        .btn-buy::after {
            content: '→';
            transition: transform 0.25s;
        }

        .btn-buy:hover {
            background: transparent;
            color: var(--terracotta);
            gap: 0.9rem;
        }

        .btn-buy:hover::after {
            transform: translateX(4px);
        }

        .btn-buy:focus-visible {
            outline: 2px solid var(--terracotta);
            outline-offset: 3px;
        }

        /* meta row */
        .meta-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .meta-key {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .meta-val {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--ink);
        }

        /* ── Responsive ── */
        @media (max-width: 860px) {
            .site-nav { padding: 1rem 1.5rem; }

            .detail-wrap {
                grid-template-columns: 1fr;
            }

            .image-pane {
                position: relative;
                height: 60vw;
                min-height: 280px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .info-pane {
                padding: 2.5rem 1.5rem;
                max-width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .image-pane img,
            .btn-buy,
            .btn-buy::after {
                transition: none;
            }
        }
    </style>
</head>
<body>

    <!-- Breadcrumb nav -->
    <nav class="site-nav">
        <a href="{% url 'product_list' %}">Products</a>
        <span class="nav-sep">/</span>
        <span class="nav-current">{{ product.product_title }}</span>
    </nav>

    <main class="detail-wrap">

        <!-- Left: sticky image -->
        <div class="image-pane">
            <img
                src="{{ product.product_image.url }}"
                alt="{{ product.product_title }}"
            >
        </div>

        <!-- Right: product info -->
        <div class="info-pane">
            <span class="product-label">Product</span>

            <h1 class="product-title">{{ product.product_title }}</h1>

            <hr class="divider">

            <div class="price-block">
                <span class="price-label">Price</span>
                <span class="price-value">{{ product.product_price }}</span>
            </div>

            <a href="{% url 'create_order' product.id %}" class="btn-buy">
                Buy Now
            </a>

            <div class="meta-row">
                <div class="meta-item">
                    <span class="meta-key">Availability</span>
                    <span class="meta-val">In Stock</span>
                </div>
                <div class="meta-item">
                    <span class="meta-key">Delivery</span>
                    <span class="meta-val">3–5 days</span>
                </div>
                <div class="meta-item">
                    <span class="meta-key">Returns</span>
                    <span class="meta-val">30 days</span>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
